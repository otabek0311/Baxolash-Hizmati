# ================================================================
# nginx-management.conf
# Management panel (manage.qrhujjat.uz) uchun Nginx konfiguratsiya.
#
# O'rnatish:
#   cp nginx-management.conf /etc/nginx/sites-available/management
#   ln -sf /etc/nginx/sites-available/management /etc/nginx/sites-enabled/management
#   nginx -t && systemctl reload nginx
#
# SSL:
#   certbot --nginx -d manage.qrhujjat.uz
# ================================================================

server {
    listen 80;
    listen [::]:80;
    server_name manage.qrhujjat.uz;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Management frontend (React/Vite — port 7100)
    location / {
        proxy_pass http://localhost:7100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Management API (Express — port 7000)
    location /api {
        proxy_pass http://localhost:7000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50m;

        # Rate limiting (management API uchun)
        limit_req zone=api burst=20 nodelay;
    }

    # Logging
    access_log /var/log/nginx/management.access.log;
    error_log  /var/log/nginx/management.error.log;
}

